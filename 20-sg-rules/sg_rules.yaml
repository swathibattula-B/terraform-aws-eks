bastion:
- name:bastion_internet  # bastion accepting connection from internet
  port:22
  src:internet
  dest:bastion
mongodb:
- name:mongodb_bastion  # mongodb accepting connection from bastion
  port:22
  src:bastion
  dest:mongodb
- name:mongodb_catalogue  # mongodb accepting connection from catalogue
  port:27017
  src:catalogue
  dest:mongodb
- name:mongodb_user  # mongodb accepting connection from user
  port:27017
  src:user
  dest:mongodb
